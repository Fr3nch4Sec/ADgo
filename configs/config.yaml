# Fichier de configuration par défaut pour ADGo
ldap_server: "ldap.example.com"
bind_dn: "cn=admin,dc=example,dc=com"
password: "password"
base_dn: "dc=example,dc=com"
auth_method: "simple"
use_ssl: false
cert_file: ""
key_file: ""
smb_server: "smb.example.com"
smb_username: "user"
smb_password: "password"
smb_domain: "DOMAIN"

ntlm:
  relay:
    listen_ip: "0.0.0.0"
    listen_port: 8080
  adcs:
    adcs_url: "http://adcs.example.com/certsrv"
    template: "User"
